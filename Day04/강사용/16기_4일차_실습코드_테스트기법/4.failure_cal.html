<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>심플 계산기</title>
    <style>
        /* 깔끔한 화면 중앙 정렬을 위한 스타일 */
        body {
            font-family: 'Malgun Gothic', sans-serif;
            background-color: #f5f6fa;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }
        /* 계산기 카드 스타일 */
        .calculator-box {
            background-color: #ffffff;
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.1);
            text-align: center;
            width: 320px;
        }
        h2 {
            margin-top: 0;
            color: #2c3e50;
        }
        /* 입력창 스타일 */
        input {
            width: 100%;
            padding: 10px;
            margin: 10px 0;
            border: 1px solid #ddd;
            border-radius: 6px;
            font-size: 16px;
            box-sizing: border-box;
        }
        /* 버튼 그룹 스타일 */
        .btn-group {
            display: flex;
            justify-content: space-between;
            margin: 15px 0;
        }
        button {
            width: 48%;
            padding: 12px;
            font-size: 18px;
            font-weight: bold;
            color: white;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            transition: background 0.2s;
        }
        .btn-plus {
            background-color: #3498db;
        }
        .btn-plus:hover {
            background-color: #2980b9;
        }
        .btn-minus {
            background-color: #e74c3c;
        }
        .btn-minus:hover {
            background-color: #c0392b;
        }
        /* 결과창 스타일 */
        #result {
            margin-top: 20px;
            font-size: 18px;
            font-weight: bold;
            color: #2c3e50;
            min-height: 27px;
        }
        
        /* 테스트 UI 배치를 위한 스타일 */
        body {
            flex-direction: column !important;
            height: auto !important;
            padding: 40px 0;
        }
        .test-box {
            background-color: #ffffff;
            padding: 20px;
            border-radius: 12px;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.1);
            width: 320px;
            margin-top: 25px;
            box-sizing: border-box;
        }
        .test-title {
            font-size: 16px;
            font-weight: bold;
            color: #2c3e50;
            margin-bottom: 12px;
            border-bottom: 2px solid #7f8c8d;
            padding-bottom: 5px;
        }
        .test-item {
            font-size: 14px;
            margin-bottom: 10px;
            line-height: 1.4;
        }
        .test-success {
            color: #2ecc71;
            font-weight: bold;
        }
        .test-fail {
            color: #e74c3c;
            font-weight: bold;
        }
    </style>
</head>
<body>

<div class="calculator-box">
    <h2>심플 계산기</h2>
    <input type="number" id="num1" placeholder="첫 번째 숫자 입력">
    <input type="number" id="num2" placeholder="두 번째 숫자 입력">
    
    <div class="btn-group">
        <button class="btn-plus" onclick="calculate('add')">+</button>
        <button class="btn-minus" onclick="calculate('subtract')">-</button>
    </div>
    
    <div id="result"></div>
</div>

<script>
    function calculate(operation) {
        // 1. 입력창의 값을 가져와 숫자로 변환합니다.
        const num1Value = document.getElementById('num1').value;
        const num2Value = document.getElementById('num2').value;
        const resultElement = document.getElementById('result');
        
        // [예외 처리] 숫자가 입력되지 않았을 경우 안내 메시지 출력
        if (num1Value === '' || num2Value === '') {
            resultElement.innerText = '두 칸 모두 숫자를 입력해주세요.';
            resultElement.style.color = '#e74c3c';
            return;
        }
        
        const num1 = Number(num1Value);
        const num2 = Number(num2Value);
        resultElement.style.color = '#2c3e50'; // 글자색 초기화
        
        // 2. 버튼 종류에 따른 연산 및 화면 출력
        if (operation === 'add') {
            // [기능 변경] 기존 결과에 무조건 +1을 더해줍니다.
            const sum = num1 + num2 + 1;
            resultElement.innerText = `더하기 결과는 ${sum}입니다.`;
        } else if (operation === 'subtract') {
            let difference = num1 - num2;
            
            if (difference < 0) {
                difference = 0;
            }
            
            resultElement.innerText = `빼기 결과는 ${difference}입니다.`;
        }
    }
</script>


<div class="test-box">
    <div class="test-title">🧪 유닛 테스트 결과 리포트</div>
    <div id="test-report"></div>
</div>

<script>
    function appendTestResult(title, isPassed, detailMessage) {
        const reportContainer = document.getElementById('test-report');
        const item = document.createElement('div');
        item.className = 'test-item';
        
        if (isPassed) {
            item.innerHTML = `✅ <span class="test-success">[PASS]</span> <strong>${title}</strong><br>측정 결과: ${detailMessage}`;
        } else {
            item.innerHTML = `❌ <span class="test-fail">[FAIL]</span> <strong>${title}</strong><br>원인: ${detailMessage}`;
        }
        
        reportContainer.appendChild(item);
    }

    function runCalculatorTests() {
        const input1 = document.getElementById('num1');
        const input2 = document.getElementById('num2');
        const resultBox = document.getElementById('result');

        // [테스트 1] 덧셈 기능 테스트 (5 + 3 = 8)
        input1.value = '5';
        input2.value = '3';
        calculate('add'); 
        const expectedAddText = '더하기 결과는 8입니다.';
        if (resultBox.innerText === expectedAddText) {
            appendTestResult('덧셈 기능 검증 (5 + 3)', true, `"${resultBox.innerText}" 정상 출력됨`);
        } else {
            appendTestResult('덧셈 기능 검증 (5 + 3)', false, `기대값은 "${expectedAddText}" 이지만 실제로는 "${resultBox.innerText}" 가 출력됨`);
        }

        // [테스트 2] 일반 뺄셈 기능 테스트 (10 - 4 = 6)
        input1.value = '10';
        input2.value = '4';
        calculate('subtract'); 
        const expectedSubText = '빼기 결과는 6입니다.';
        if (resultBox.innerText === expectedSubText) {
            appendTestResult('일반 뺄셈 검증 (10 - 4)', true, `"${resultBox.innerText}" 정상 출력됨`);
        } else {
            appendTestResult('일반 뺄셈 검증 (10 - 4)', false, `기대값은 "${expectedSubText}" 이지만 실제로는 "${resultBox.innerText}" 가 출력됨`);
        }

        // [테스트 3] 뺄셈 결과 음수 예외 테스트 (3 - 7 = -4 -> 결과는 0이어야 함)
        input1.value = '3';
        input2.value = '7';
        calculate('subtract'); 
        const expectedNegativeSubText = '빼기 결과는 0입니다.';
        if (resultBox.innerText === expectedNegativeSubText) {
            appendTestResult('뺄셈 음수 제한 검증 (3 - 7)', true, `"${resultBox.innerText}" 정상 출력됨 (음수 방어 성공)`);
        } else {
            appendTestResult('뺄셈 음수 제한 검증 (3 - 7)', false, `기대값은 "${expectedNegativeSubText}" 이지만 실제로는 "${resultBox.innerText}" 가 출력됨`);
        }

        // [테스트 종료 후 복원]
        input1.value = '';
        input2.value = '';
        resultBox.innerText = '';
    }

    window.addEventListener('DOMContentLoaded', runCalculatorTests);
</script>

</body>
</html>
